<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-default>PokeWing OS</title>
    <!-- Modern uygulama fontu (Inter) — internet yoksa Segoe UI'ya düşer -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* En önemli kısım burası: Tüm alanı doldurmasını sağlıyoruz */
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden; /* Siyah kutu taşmalarını engeller */
        background-color: transparent; /* Minecraft ekranını arkada bırakır */
      }
      
      /* React ana kapsayıcısını MCEF boyutuna esnek yapıyoruz */
      #root {
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
    <meta property="og:image" content="https://bolt.new/static/og_default.png" />

    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
